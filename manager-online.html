<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manager Console</title>
  <style>
    :root {
      --bg:#f5f7fb; --card:#fff; --ink:#111827; --muted:#667085; --line:#d8dee8;
      --blue:#2563eb; --green:#16845b; --amber:#b7791f; --red:#c24141; --dark:#101828;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,"Microsoft YaHei",sans-serif; color:var(--ink); background:var(--bg); }
    body.loading, body.loading * { cursor:progress !important; }
    header { background:var(--dark); color:#fff; padding:16px 22px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    h1,h2,h3,p { margin-top:0; }
    h1 { font-size:20px; margin-bottom:4px; }
    h2 { font-size:18px; }
    h3 { font-size:15px; margin-bottom:8px; }
    button,input,select { font:inherit; }
    button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:9px 12px; cursor:pointer; min-height:38px; }
    button.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
    button.danger { color:var(--red); border-color:#ffd0d0; background:#fff8f8; }
    button.good { color:var(--green); border-color:#bfe8d3; background:#f1fbf6; }
    input,select { border:1px solid var(--line); border-radius:6px; padding:9px 10px; width:100%; background:#fff; }
    label { display:grid; gap:6px; font-size:12px; color:#475467; font-weight:700; }
    main { padding:16px; max-width:1320px; margin:0 auto; }
    .muted { color:var(--muted); }
    .small { font-size:12px; }
    .header-actions,.toolbar,.actions { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
    .header-actions { align-items:center; justify-content:flex-end; }
    .lang { width:auto; min-width:132px; border-color:#344054; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px; }
    .tab { border-color:var(--line); color:#344054; }
    .tab.active { background:#e8efff; color:#1849b8; border-color:#b7c7ff; font-weight:800; }
    .panel,.stat { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
    .two { display:grid; grid-template-columns:1.2fr .8fr; gap:12px; }
    .stat b { display:block; font-size:26px; margin-top:4px; }
    .badge { display:inline-flex; align-items:center; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:800; }
    .green { background:#e8f7ef; color:#106b49; }
    .amber { background:#fff4df; color:#99610f; }
    .red { background:#ffe8e8; color:#a83333; }
    .blue { background:#e8efff; color:#1849b8; }
    .gray { background:#eef2f6; color:#475467; }
    tr.pending-row { background:#fffaf0; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:8px; background:#fff; }
    table { border-collapse:collapse; width:100%; min-width:900px; }
    th,td { border-bottom:1px solid var(--line); padding:9px; text-align:left; white-space:nowrap; font-size:13px; vertical-align:middle; }
    th { background:#f8fafc; color:#475467; }
    th.sortable { cursor:pointer; user-select:none; }
    th.sortable:hover { color:#1849b8; background:#eef4ff; }
    .actions button { min-height:30px; padding:5px 8px; font-size:12px; }
    .calendar-toolbar { display:flex; align-items:end; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .calendar-title { font-size:22px; font-weight:900; min-width:130px; }
    .calendar { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:1px; border:1px solid var(--line); background:var(--line); border-radius:8px; overflow:hidden; }
    .weekday,.day { background:var(--card); margin:0; }
    .weekday { padding:9px 10px; color:#475467; font-size:12px; font-weight:800; }
    .day { min-height:132px; padding:9px; cursor:pointer; }
    .day:hover { background:#f8fafc; }
    .day.selected { outline:2px solid var(--blue); outline-offset:-2px; background:#eef4ff; }
    .day.outside { background:#f8fafc; color:#98a2b3; }
    .day h3 { display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:8px; font-size:13px; }
    .shift { border:1px solid var(--line); border-radius:6px; padding:6px; margin-bottom:5px; background:#fafcff; font-size:12px; line-height:1.35; overflow:hidden; text-overflow:ellipsis; }
    .shift.missing { border-color:#ffb4b4; background:#fff1f1; color:#9f1f1f; font-weight:800; }
    .more { color:#1849b8; font-size:12px; font-weight:800; }
    .seg { display:flex; gap:6px; padding:3px; border:1px solid var(--line); border-radius:8px; background:#fff; }
    .seg button { min-height:32px; padding:5px 10px; border-radius:6px; }
    .seg button.active { background:#e8efff; border-color:#b7c7ff; color:#1849b8; font-weight:900; }
    .legend { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .legend span { display:inline-flex; gap:6px; align-items:center; color:var(--muted); font-size:12px; }
    .dot { width:10px; height:10px; border-radius:999px; display:inline-block; }
    .calendar-summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-top:12px; }
    .mini-stat { border:1px solid var(--line); border-radius:8px; padding:10px; background:#fff; }
    .mini-stat b { display:block; font-size:20px; margin-top:3px; }
    .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:var(--dark); color:#fff; padding:10px 14px; border-radius:8px; opacity:0; pointer-events:none; transition:.2s; max-width:92vw; z-index:20; }
    .toast.show { opacity:1; }
    .loading-bar { position:fixed; left:0; right:0; top:0; height:3px; background:linear-gradient(90deg,var(--blue),var(--green),var(--amber)); transform:scaleX(0); transform-origin:left; opacity:0; transition:opacity .15s; z-index:50; animation:loadingMove 1.1s ease-in-out infinite; }
    body.loading .loading-bar { opacity:1; }
    @keyframes loadingMove { 0%{transform:scaleX(.08)} 50%{transform:scaleX(.72)} 100%{transform:scaleX(1)} }
    .hidden { display:none !important; }
    @media (max-width:960px){ .grid,.two,.calendar-summary{grid-template-columns:1fr 1fr;} .calendar{grid-template-columns:1fr 1fr;} header{align-items:flex-start;} }
    @media (max-width:640px){ .grid,.two,.calendar,.calendar-summary{grid-template-columns:1fr;} header{display:block;} .header-actions{justify-content:flex-start; margin-top:12px;} }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 data-i18n="title">Manager Console</h1>
      <p class="small" style="color:#cbd5e1;margin:0;" data-i18n="subtitle">Feishu Base + Vercel API + Bot Notification</p>
    </div>
    <div class="header-actions">
      <select id="lang" class="lang" onchange="setLang(this.value)" aria-label="Language">
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="id">Bahasa</option>
      </select>
      <button onclick="location.href='./admin-online.html'" data-i18n="openAdmin">Admin</button>
      <button onclick="location.href='./anchor-online.html'" data-i18n="openHost">Host Portal</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="toolbar">
        <label><span data-i18n="startDate">Start date</span><input id="startDate" type="date"></label>
        <label><span data-i18n="days">Days</span><input id="days" type="number" min="1" max="31" value="7"></label>
        <label><span data-i18n="keyword">Search</span><input id="keyword" oninput="render()" placeholder="host / brand / room"></label>
        <label><span data-i18n="status">Status</span><select id="statusFilter" onchange="render()"><option value="">All</option><option>草稿</option><option>已发布</option><option>已确认</option><option>缺人</option></select></label>
        <button class="primary" onclick="generateSchedule()" data-i18n="generate">Generate</button>
        <button onclick="publishDrafts()" data-i18n="publishDrafts">Publish drafts</button>
        <button onclick="loadAll()" data-i18n="refresh">Refresh</button>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="dashboard" onclick="setTab('dashboard')" data-i18n="dashboard">Dashboard</button>
      <button class="tab" data-tab="calendar" onclick="setTab('calendar')" data-i18n="calendar">Calendar</button>
      <button class="tab" data-tab="schedules" onclick="setTab('schedules')" data-i18n="schedules">Schedules</button>
      <button class="tab" data-tab="swaps" onclick="setTab('swaps')" data-i18n="swaps">Swap Pool</button>
      <button class="tab" data-tab="declarations" onclick="setTab('declarations')" data-i18n="requests">Requests</button>
      <button class="tab" data-tab="anchors" onclick="setTab('anchors')" data-i18n="hosts">Hosts</button>
    </nav>

    <section id="dashboardView"></section>
    <section id="calendarView" class="hidden"></section>
    <section id="schedulesView" class="hidden"></section>
    <section id="swapsView" class="hidden"></section>
    <section id="declarationsView" class="hidden"></section>
    <section id="anchorsView" class="hidden"></section>

    <section class="panel">
      <h2 data-i18n="systemStatus">System Status</h2>
      <pre id="health" class="small muted"></pre>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <div class="loading-bar" aria-hidden="true"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const F = {
      schedule:{ date:"日期", shift:"班次", start:"开始时间", end:"结束时间", host:"主播姓名", brand:"品牌", room:"直播间", roomAccount:"直播间账号", status:"状态", note:"备注" },
      declaration:{ host:"主播姓名", type:"申报类型", date:"日期", start:"开始时间", end:"结束时间", original:"原班次", reason:"原因", status:"状态" },
      host:{ id:"主播ID", name:"姓名", english:"英文名", language:"语言", country:"国家", timezone:"时区", category:"擅长类目", level:"等级", target:"月目标工时", maxDaily:"每日最多场次", status:"状态" },
      brand:{ name:"品牌名", category:"类目", language:"需要语言", room:"直播间名称", roomAccount:"直播间账号", priority:"优先级", status:"状态" },
      template:{ name:"班次名称", start:"开始时间", end:"结束时间", duration:"默认时长", status:"状态" }
    };
    const TEXT = {
      en:{ title:"Manager Console", subtitle:"Feishu Base + Vercel API + Bot Notification", openAdmin:"Admin", openHost:"Host Portal", startDate:"Start date", days:"Days", keyword:"Search", status:"Status", generate:"Generate", publishDrafts:"Publish matched drafts", refresh:"Refresh", dashboard:"Dashboard", calendar:"Calendar", schedules:"Schedules", swaps:"Swap Pool", requests:"Requests", hosts:"Hosts", systemStatus:"System Status", empty:"No data", dashboardHint:"Review workload, generate schedules, publish shifts, and process requests.", risk:"Risk shifts", auto:"Auto scheduling", manual:"Manual assignment", workload:"Monthly workload", audit:"Generate weekly audit", cleanup:"Clean duplicate schedules", addManual:"Add manual shift", oneDay:"Only this day", oneWeek:"1 week", twoWeeks:"2 weeks", fullMonth:"Full month", room:"Livestream account", host:"Host", total:"All", previous:"Previous", next:"Next", today:"Today", details:"Details", allRooms:"All accounts", allHosts:"All hosts", notes:"Notes", planned:"Planned", missing:"Missing", legend:"Legend", monthlyShifts:"Monthly shifts", monthlyHours:"Monthly hours", targetHours:"Target hours", balanceHours:"Balance hours", moreItems:"{count} more", activeAccounts:"Accounts", assignedHosts:"Assigned hosts", activeDays:"Active days", manualSchedule:"Manual schedule" },
      zh:{ title:"主管排班后台", subtitle:"飞书多维表格 + Vercel API + 机器人通知", openAdmin:"管理员端", openHost:"主播入口", startDate:"开始日期", days:"生成天数", keyword:"搜索", status:"状态", generate:"生成排班", publishDrafts:"一键发布已匹配排班", refresh:"刷新", dashboard:"今日大盘", calendar:"日历", schedules:"排班", swaps:"换班池", requests:"申报", hosts:"主播", systemStatus:"系统状态", empty:"暂无数据", dashboardHint:"主管看全盘、生成排班、发布班表、处理申报。", risk:"风险班次", auto:"自动排班", manual:"手动指定排班", workload:"月度工时", audit:"生成每周留痕", cleanup:"清理重复排班", addManual:"添加手动排班", oneDay:"只排这一天", oneWeek:"排 1 周", twoWeeks:"排 2 周", fullMonth:"排整月", room:"直播间账号", host:"主播", total:"总盘", previous:"上一月", next:"下一月", today:"今天", details:"明细", allRooms:"全部直播间账号", allHosts:"全部主播", notes:"备注", planned:"已排", missing:"缺口", legend:"图例", monthlyShifts:"当月场次", monthlyHours:"当月工时", targetHours:"目标工时", balanceHours:"剩余/超出", moreItems:"还有 {count} 项", activeAccounts:"直播间账号数", assignedHosts:"已排主播数", activeDays:"有排班天数", manualSchedule:"手动排班" },
      id:{ title:"Konsol Manager", subtitle:"Feishu Base + Vercel API + Notifikasi Bot", openAdmin:"Admin", openHost:"Portal Host", startDate:"Tanggal mulai", days:"Hari", keyword:"Cari", status:"Status", generate:"Buat jadwal", publishDrafts:"Publish draft cocok", refresh:"Refresh", dashboard:"Dashboard", calendar:"Kalender", schedules:"Jadwal", swaps:"Pool Tukar", requests:"Permintaan", hosts:"Host", systemStatus:"Status Sistem", empty:"Belum ada data", dashboardHint:"Pantau jadwal, buat jadwal, publish shift, dan proses permintaan.", risk:"Shift berisiko", auto:"Jadwal otomatis", manual:"Assign manual", workload:"Jam bulanan", audit:"Buat audit mingguan", cleanup:"Bersihkan duplikat", addManual:"Tambah shift manual", oneDay:"Hari ini saja", oneWeek:"1 minggu", twoWeeks:"2 minggu", fullMonth:"Sebulan", room:"Akun live", host:"Host", total:"Semua", previous:"Sebelumnya", next:"Berikutnya", today:"Hari ini", details:"Detail", allRooms:"Semua akun", allHosts:"Semua host", notes:"Catatan", planned:"Terjadwal", missing:"Kosong", legend:"Legenda", monthlyShifts:"Shift bulanan", monthlyHours:"Jam bulanan", targetHours:"Target jam", balanceHours:"Sisa/lebih", moreItems:"{count} lagi", activeAccounts:"Akun", assignedHosts:"Host terjadwal", activeDays:"Hari aktif", manualSchedule:"Assign manual" }
    };
    const STATUS_CLASS = { "待处理":"amber", "草稿":"gray", "已发布":"blue", "已确认":"green", "已同意":"green", "已拒绝":"red", "缺人":"red", "停用":"red", "正常":"green", "历史":"gray", "已取消":"gray" };
    const STATUS_RANK = { "待处理":0, "缺人":1, "草稿":2, "已发布":3, "已确认":4, "已同意":5, "已拒绝":6, "停用":7, "正常":8 };
    const INACTIVE_SCHEDULE = new Set(["历史", "已取消"]);
    const state = {
      anchors:[], brands:[], templates:[], declarations:[], schedules:[], workload:[],
      tab:"dashboard", loading:0, scheduleSort:{ key:F.schedule.date, dir:"desc" }, manualPrefill:null, scrollCalendarDetails:false,
      calendar:{ month:new Date().toISOString().slice(0, 7), view:"total", room:"", host:"", selectedDate:new Date().toISOString().slice(0, 10) }
    };
    let currentLang = localStorage.getItem("uiLang") || "en";

    function text() { return TEXT[currentLang] || TEXT.en; }
    function field(record, name) {
      const value = record && record.fields ? record.fields[name] : "";
      if (Array.isArray(value)) return value.map((item) => item.text || item.name || item).join(",");
      if (value && typeof value === "object") return value.text || value.name || JSON.stringify(value);
      return value == null ? "" : String(value);
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
    }
    function jsValue(value) {
      return escapeHtml(JSON.stringify(value));
    }
    function jsArg(value) {
      return escapeHtml(JSON.stringify(String(value || "")));
    }
    function unique(list) { return [...new Set(list.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "zh-Hans-CN", { numeric:true })); }
    function today() { return new Date().toISOString().slice(0, 10); }
    function localDate(y, m, d) {
      const date = new Date(y, m, d);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }
    function monthParts(month) { const [year, mon] = month.split("-").map(Number); return { year, monthIndex:mon - 1 }; }
    function monthDates(month) {
      const { year, monthIndex } = monthParts(month);
      const days = new Date(year, monthIndex + 1, 0).getDate();
      return Array.from({ length:days }, (_, index) => localDate(year, monthIndex, index + 1));
    }
    function minutes(time) {
      const [h, m] = String(time || "0:0").split(":").map(Number);
      return (h || 0) * 60 + (m || 0);
    }
    function scheduleHours(record) {
      return Math.max(0, (minutes(field(record, F.schedule.end)) - minutes(field(record, F.schedule.start))) / 60);
    }
    function isActiveSchedule(record) { return !INACTIVE_SCHEDULE.has(field(record, F.schedule.status)); }
    function isMissingSchedule(record) { return record.isGap || !field(record, F.schedule.host) || field(record, F.schedule.status) === "缺人"; }
    function scheduleTime(record) { return `${field(record, F.schedule.start)}-${field(record, F.schedule.end)}`; }
    function scheduleRoomAccount(record) { return field(record, F.schedule.roomAccount) || field(record, F.schedule.room); }
    function brandRoomAccount(record) { return field(record, F.brand.roomAccount) || field(record, F.brand.room); }
    function scheduleLabel(record) {
      if (!record) return "-";
      return `${field(record, F.schedule.date)} ${field(record, F.schedule.shift)} ${scheduleTime(record)} · ${field(record, F.schedule.host) || "-"} · ${scheduleRoomAccount(record) || field(record, F.schedule.brand)}`;
    }
    function moreItemsLabel(count) { return (text().moreItems || "{count} more").replace("{count}", count); }
    function badge(status) { return `<span class="badge ${STATUS_CLASS[status] || "gray"}">${escapeHtml(status || "-")}</span>`; }
    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.__toast);
      window.__toast = setTimeout(() => el.classList.remove("show"), 1800);
    }
    function setLoading(active) {
      state.loading += active ? 1 : -1;
      if (state.loading < 0) state.loading = 0;
      document.body.classList.toggle("loading", state.loading > 0);
    }
    async function api(path, options) {
      setLoading(true);
      try {
        const res = await fetch(path, options);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "API error");
        return data;
      } finally {
        setLoading(false);
      }
    }
    function post(path, body) {
      return api(path, { method:"POST", headers:{ "content-type":"application/json" }, body:JSON.stringify(body) });
    }

    function setLang(lang) {
      currentLang = TEXT[lang] ? lang : "en";
      localStorage.setItem("uiLang", currentLang);
      $("lang").value = currentLang;
      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = text()[el.dataset.i18n] || ""; });
      document.title = text().title;
      render();
    }
    function setTab(tab) {
      state.tab = tab;
      document.querySelectorAll(".tab").forEach((el) => el.classList.toggle("active", el.dataset.tab === tab));
      ["dashboard","calendar","schedules","swaps","declarations","anchors"].forEach((name) => $(`${name}View`).classList.toggle("hidden", name !== tab));
      render();
    }

    async function loadAll() {
      try {
        const data = await api("/api/bootstrap");
        state.anchors = data.records.anchors || [];
        state.brands = data.records.brands || [];
        state.templates = data.records.templates || [];
        state.declarations = data.records.declarations || [];
        state.schedules = (data.records.schedules || []).filter(isActiveSchedule);
        $("health").textContent = JSON.stringify(data.env || {}, null, 2);
        render();
        toast(text().refresh);
      } catch (error) {
        toast(error.message);
        $("health").textContent = error.stack || error.message;
      }
    }
    async function refreshSchedulesOnly() {
      const data = await api("/api/data?type=schedules");
      state.schedules = (data.records || []).filter(isActiveSchedule);
      render();
    }
    async function updateRecord(type, recordId, fields, notifyText) {
      return post("/api/update", { type, recordId, fields, notifyText });
    }
    function showCalendarAt(date) {
      const targetDate = date || today();
      state.calendar.month = targetDate.slice(0, 7);
      state.calendar.selectedDate = targetDate;
      setTab("calendar");
    }

    async function generateSchedule() {
      try {
        const startDate = $("startDate").value || today();
        const data = await post("/api/generate", { startDate:$("startDate").value, days:$("days").value });
        toast(`Generated ${data.count || data.created || 0}; missing ${data.missing || 0}`);
        await refreshSchedulesOnly();
        showCalendarAt(startDate);
      } catch (error) { toast(error.message); }
    }
    function generateQuick(days) { $("days").value = days; generateSchedule(); }
    async function generateMonthSchedule() {
      try {
        const data = await post("/api/generate", { month:($("startDate").value || today()).slice(0, 7) });
        toast(`Generated ${data.count || data.created || 0}; missing ${data.missing || 0}`);
        await refreshSchedulesOnly();
        await loadWorkload();
        showCalendarAt(`${($("startDate").value || today()).slice(0, 7)}-01`);
      } catch (error) { toast(error.message); }
    }
    async function cleanupSchedules() {
      try {
        const data = await post("/api/generate", { action:"cleanup-duplicates" });
        toast(`Marked ${data.markedHistory || 0} duplicate schedules as history`);
        await refreshSchedulesOnly();
      } catch (error) { toast(error.message); }
    }
    async function loadWorkload() {
      try {
        const month = ($("startDate").value || today()).slice(0, 7);
        const data = await api(`/api/workload?month=${month}`);
        state.workload = data.records || [];
        render();
      } catch (error) { toast(error.message); }
    }
    async function generateWeeklyAudit() {
      try {
        const data = await api(`/api/audit-weekly?from=${$("startDate").value || today()}`);
        toast(`Audit rows: ${data.count || 0}`);
      } catch (error) { toast(error.message); }
    }
    async function createManualSchedule() {
      try {
        const template = state.templates.find((item) => field(item, F.template.name) === $("manualShift").value) || {};
        const brand = state.brands.find((item) => field(item, F.brand.name) === $("manualBrand").value) || {};
        if (state.manualPrefill?.recordId) {
          await updateRecord("schedules", state.manualPrefill.recordId, {
            [F.schedule.host]:$("manualHost").value,
            [F.schedule.status]:$("manualStatus").value,
            [F.schedule.note]:$("manualNote").value || "主管手动指定"
          }, `缺人班次已手动排班：${$("manualHost").value}`);

        field(record, F.schedule.note).includes("自动排班")
      );

        await post("/api/update", {
          type:"schedules",

          notifyText:`已发布 ${drafts.length} 条排班。`

        const record = state.declarations.find((item) => item.record_id === recordId);

        render();
      } catch (error) { toast(error.message); }

    function activeHosts() { return state.anchors.filter((item) => field(item, F.host.status) !== "停用"); }
    function activeBrands() { return state.brands.filter((item) => field(item, F.brand.status) !== "停用"); }
    function activeTemplates() { return state.templates.filter((item) => field(item, F.template.status) !== "停用"); }
    function activeRoomAccounts() {
      return unique(activeBrands().map(brandRoomAccount).concat(state.schedules.filter(isActiveSchedule).map(scheduleRoomAccount)));
    }
    function statusRank(status) { return STATUS_RANK[status] ?? 9; }
    function byStatusThenDate(a, b) {
      const rank = statusRank(field(a, F.declaration.status) || field(a, F.schedule.status)) - statusRank(field(b, F.declaration.status) || field(b, F.schedule.status));
      if (rank) return rank;
      return `${field(b, F.schedule.date) || field(b, F.declaration.date)} ${field(b, F.schedule.start) || field(b, F.declaration.start)}`.localeCompare(`${field(a, F.schedule.date) || field(a, F.declaration.date)} ${field(a, F.schedule.start) || field(a, F.declaration.start)}`);
    }
    function filteredSchedules() {
      const term = $("keyword").value.trim().toLowerCase();
      const status = $("statusFilter").value;
      return state.schedules.filter((record) => {
        const haystack = [field(record, F.schedule.host), field(record, F.schedule.brand), field(record, F.schedule.room), scheduleRoomAccount(record), field(record, F.schedule.shift), field(record, F.schedule.date)].join(" ").toLowerCase();
        return (!term || haystack.includes(term)) && (!status || field(record, F.schedule.status) === status);
      });
    }
    function setScheduleSort(key) {
      state.scheduleSort = state.scheduleSort.key === key ? { key, dir:state.scheduleSort.dir === "asc" ? "desc" : "asc" } : { key, dir:"asc" };
      render();
    }
    function sortValue(record, key) {
      if (key === "__time") return scheduleTime(record);
      if (key === "__roomAccount") return scheduleRoomAccount(record);
      return field(record, key);
    }
    function sortSchedules(records) {
      const { key, dir } = state.scheduleSort;
      const factor = dir === "asc" ? 1 : -1;
      return records.slice().sort((a, b) => {
        const result = String(sortValue(a, key)).localeCompare(String(sortValue(b, key)), "zh-Hans-CN", { numeric:true });
        return result ? result * factor : byStatusThenDate(a, b);
      });
    }

    function renderDashboard() {
      const pending = state.declarations.filter((record) => field(record, F.declaration.status) === "待处理");
      const risk = state.schedules.filter(isMissingSchedule);

      $("dashboardView").innerHTML = `

          <div class="stat"><span class="muted">${text().hosts}</span><b>${state.anchors.length}</b></div>
          <div class="stat"><span class="muted">Brands / rooms</span><b>${state.brands.length}</b></div>
          <div class="stat"><span class="muted">Pending</span><b>${pending.length}</b></div>

    function setCalendarMonth(delta) {

      renderCalendar();

    function setCalendarToday() { state.calendar.month = today().slice(0, 7); state.calendar.selectedDate = today(); renderCalendar(); }

    function selectCalendarDate(date) {
      state.calendar.selectedDate = date;
      renderCalendar();
      setTimeout(() => $("calendarDetails")?.scrollIntoView({ behavior:"smooth", block:"center" }), 60);
    }
    function manualSeed(record) {
      return {
        recordId:record.isGap ? "" : record.record_id,
        date:field(record, F.schedule.date),
        shift:field(record, F.schedule.shift),
        start:field(record, F.schedule.start),
        end:field(record, F.schedule.end),
        brand:field(record, F.schedule.brand),
        room:field(record, F.schedule.room),
        roomAccount:scheduleRoomAccount(record)
      };
    }
    function openManualSchedule(seed) {

      setTab("schedules");
      setTimeout(() => $("manualPanel")?.scrollIntoView({ behavior:"smooth", block:"center" }), 80);
    }
    function actualCalendarRows() {
      return state.schedules.filter((record) => {
        if (!isActiveSchedule(record)) return false;
        if (!field(record, F.schedule.date).startsWith(state.calendar.month)) return false;
        if (state.calendar.view === "room" && state.calendar.room && scheduleRoomAccount(record) !== state.calendar.room) return false;
        if (state.calendar.view === "host" && state.calendar.host && field(record, F.schedule.host) !== state.calendar.host) return false;
        return true;
      }).sort((a, b) => `${field(a, F.schedule.date)} ${field(a, F.schedule.start)}`.localeCompare(`${field(b, F.schedule.date)} ${field(b, F.schedule.start)}`));
    }
    function expectedGapRows() {
      if (state.calendar.view === "host") return [];
      const templates = activeTemplates();
      const brands = activeBrands().filter((brand) => {
        const room = brandRoomAccount(brand);
        return room && (!state.calendar.room || room === state.calendar.room);
      });
      if (!templates.length || !brands.length) return [];

      const scheduledKeys = new Set(state.schedules
        .filter((record) => isActiveSchedule(record) && field(record, F.schedule.date).startsWith(state.calendar.month))
        .map((record) => [field(record, F.schedule.date), scheduleRoomAccount(record), field(record, F.schedule.start), field(record, F.schedule.end)].join("|")));
      const gaps = [];
      for (const date of monthDates(state.calendar.month)) {
        for (const brand of brands) {
          for (const template of templates) {
            const room = brandRoomAccount(brand);
            const start = field(template, F.template.start);
            const end = field(template, F.template.end);
            const key = [date, room, start, end].join("|");
            if (scheduledKeys.has(key)) continue;
            gaps.push({
              isGap:true,
              record_id:`gap-${key}`,
              fields:{
                [F.schedule.date]:date,
                [F.schedule.shift]:field(template, F.template.name) || `${start}-${end}`,
                [F.schedule.start]:start,
                [F.schedule.end]:end,
                [F.schedule.host]:"",
                [F.schedule.brand]:field(brand, F.brand.name),
                [F.schedule.room]:room,
                [F.schedule.roomAccount]:room,
                [F.schedule.status]:"缺人",
                [F.schedule.note]:"系统复查：该直播间账号此班次未排班"
              }
            });
          }
        }
      }
      return gaps;
    }
    function calendarRows() {
      return actualCalendarRows().concat(expectedGapRows())
        .sort((a, b) => `${field(a, F.schedule.date)} ${field(a, F.schedule.start)} ${scheduleRoomAccount(a)}`.localeCompare(`${field(b, F.schedule.date)} ${field(b, F.schedule.start)} ${scheduleRoomAccount(b)}`));
    }
    function renderCalendar() {
      const { year, monthIndex } = monthParts(state.calendar.month);
      const first = new Date(year, monthIndex, 1);
      const rows = calendarRows();

        const date = field(record, F.schedule.date);
        (map[date] ||= []).push(record);
        return map;
      }, {});
      const rooms = activeRoomAccounts();
      const hosts = unique(activeHosts().map((record) => field(record, F.host.name)).concat(state.schedules.filter(isActiveSchedule).map((record) => field(record, F.schedule.host))));

        id:["Min","Sen","Sel","Rab","Kam","Jum","Sab"]

      const cells = [];
      for (let i = 0; i < 42; i += 1) {
        const dateObject = new Date(year, monthIndex, i - first.getDay() + 1);
        const date = localDate(dateObject.getFullYear(), dateObject.getMonth(), dateObject.getDate());
        const rows = byDate[date] || [];
        const visible = rows.slice(0, 3);
        const more = rows.length - visible.length;
        cells.push(`<div class="day ${dateObject.getMonth() !== monthIndex ? "outside" : ""} ${date === state.calendar.selectedDate ? "selected" : ""}" onclick="selectCalendarDate('${date}')">
          <h3><span>${dateObject.getDate()}</span>${rows.length ? `<span class="badge ${rows.some(isMissingSchedule) ? "red" : "blue"}">${rows.length}</span>` : ""}</h3>
          ${visible.map((record) => `<div class="shift ${isMissingSchedule(record) ? "missing" : ""}" title="${escapeHtml(scheduleLabel(record))}">
            <b>${escapeHtml(scheduleTime(record))}</b> ${escapeHtml(field(record, F.schedule.host) || "缺人")}<br>${escapeHtml(scheduleRoomAccount(record) || field(record, F.schedule.brand))}
          </div>`).join("")}
          ${more > 0 ? `<div class="more">${escapeHtml(moreItemsLabel(more))}</div>` : ""}
        </div>`);
      }
      const selectedRows = rows.filter((record) => field(record, F.schedule.date) === state.calendar.selectedDate);
      $("calendarView").innerHTML = `<section class="panel">
        <div class="calendar-toolbar">
          <div class="toolbar">
            <button onclick="setCalendarMonth(-1)">${text().previous}</button>
            <button onclick="setCalendarToday()">${text().today}</button>
            <button onclick="setCalendarMonth(1)">${text().next}</button>
            <div class="calendar-title">${state.calendar.month}</div>
          </div>
          <div class="toolbar">
            <div class="seg">
              <button class="${state.calendar.view === "total" ? "active" : ""}" onclick="setCalendarView('total')">${text().total}</button>
              <button class="${state.calendar.view === "room" ? "active" : ""}" onclick="setCalendarView('room')">${text().room}</button>
              <button class="${state.calendar.view === "host" ? "active" : ""}" onclick="setCalendarView('host')">${text().host}</button>
            </div>
            <label class="${state.calendar.view === "room" ? "" : "hidden"}">${text().room}<select onchange="setCalendarFilter('room', this.value)"><option value="">${text().allRooms}</option>${rooms.map((room) => `<option value="${escapeHtml(room)}" ${room === state.calendar.room ? "selected" : ""}>${escapeHtml(room)}</option>`).join("")}</select></label>
            <label class="${state.calendar.view === "host" ? "" : "hidden"}">${text().host}<select onchange="setCalendarFilter('host', this.value)"><option value="">${text().allHosts}</option>${hosts.map((host) => `<option value="${escapeHtml(host)}" ${host === state.calendar.host ? "selected" : ""}>${escapeHtml(host)}</option>`).join("")}</select></label>
          </div>
        </div>
        ${renderCalendarLegend()}
        ${renderCalendarSummary(rows)}
        <div class="calendar">${weekdays}${cells.join("")}</div>
      </section>
      <section class="panel" id="calendarDetails"><h2>${state.calendar.selectedDate} ${text().details}</h2>${scheduleRows(selectedRows)}</section>`;
    }
    function renderCalendarLegend() {
      return `<div class="legend" aria-label="${text().legend}">
        <span><i class="dot blue"></i>${text().planned}</span>
        <span><i class="dot red"></i>${text().missing}</span>

      </div>`;

    function renderCalendarSummary(rows) {
      const host = state.anchors.find((record) => field(record, F.host.name) === state.calendar.host);

      const missingRows = rows.filter((record) => record.isGap);
      const monthlyHours = actualRows.reduce((sum, record) => sum + scheduleHours(record), 0);
      const activeDays = unique(actualRows.map((record) => field(record, F.schedule.date))).length;
      const accountCount = unique(rows.map(scheduleRoomAccount)).length;
      const hostCount = unique(actualRows.map((record) => field(record, F.schedule.host))).length;
      const targetHours = Number(field(host, F.host.target)) || 0;
      const balance = targetHours - monthlyHours;
      if (state.calendar.view === "host" && state.calendar.host) {
        return `<div class="calendar-summary">
          <div class="mini-stat"><span class="muted">${text().monthlyShifts}</span><b>${actualRows.length}</b></div>

      const manualEnd = prefill.end || field(firstTemplate, F.template.end) || "12:00";
      const manualBrand = prefill.brand || field(firstBrand, F.brand.name);

      $("schedulesView").innerHTML = `<section class="panel"><h2>${text().auto}</h2><div class="toolbar">

      <section class="panel" id="manualPanel"><h2>${text().manual}</h2><div class="toolbar">

      $("manualRoom").value = field(brand, F.brand.room) || $("manualRoom").value;

    function scheduleRows(records) {

        ["Brand", F.schedule.brand], [text().room, "__roomAccount"], ["Status", F.schedule.status], ["Notes", ""]
      ];
      const heads = columns.map(([label, key]) => {

        return `<th class="sortable" onclick="setScheduleSort('${key}')">${label}${mark}</th>`;

        const status = field(record, F.declaration.status);
        return `<tr class="${status === "待处理" ? "pending-row" : ""}">
          <td>${escapeHtml(field(record, F.declaration.host))}</td><td>${escapeHtml(field(record, F.declaration.type))}</td><td>${escapeHtml(field(record, F.declaration.date))}</td><td>${escapeHtml(field(record, F.declaration.start))}-${escapeHtml(field(record, F.declaration.end))}</td>
          <td>${escapeHtml(field(record, F.declaration.reason))}</td><td>${badge(status)}</td>
          <td><div class="actions">${status === "待处理" ? `<button class="good" onclick="setDeclarationStatus('${record.record_id}','已同意')">Approve</button><button class="danger" onclick="setDeclarationStatus('${record.record_id}','已拒绝')">Reject</button>` : ""}</div></td>
        </tr>`;
      }).join("")}</tbody></table></div>`;
    }
    function parseSwapMeta(reason) {
      const line = String(reason || "").split("\n").find((item) => item.startsWith("SWAP|"));
      if (!line) return null;
      const parts = line.split("|");
      return { mode:parts[1] || "exchange", from:parts[2] || "", to:parts[3] || "", target:parts[4] || "" };
    }
    function renderSwaps() {
      const swaps = state.declarations
        .map((record) => ({ record, meta:parseSwapMeta(field(record, F.declaration.reason)) }))
        .filter((item) => item.meta)
        .sort((a, b) => byStatusThenDate(a.record, b.record));
      $("swapsView").innerHTML = `<section class="panel"><h2>${text().swaps}</h2>
        <div class="table-wrap"><table><thead><tr><th>A</th><th>Target</th><th>Mode</th><th>A Shift</th><th>B Shift</th><th>Status</th><th>Actions</th></tr></thead><tbody>${swaps.map((item) => {
          const from = state.schedules.find((record) => record.record_id === item.meta.from);
          const to = state.schedules.find((record) => record.record_id === item.meta.to);
          const status = field(item.record, F.declaration.status);
          return `<tr class="${status === "待处理" ? "pending-row" : ""}">
            <td>${escapeHtml(field(item.record, F.declaration.host))}</td><td>${escapeHtml(item.meta.target || field(to, F.schedule.host))}</td><td>${escapeHtml(item.meta.mode)}</td>
            <td>${escapeHtml(scheduleLabel(from))}</td><td>${escapeHtml(scheduleLabel(to))}</td><td>${badge(status)}</td>
            <td><div class="actions">${status === "待处理" ? `<button class="good" onclick="completeSwap(${jsArg(item.record.record_id)},${jsArg(item.meta.target || field(to, F.schedule.host))})">Complete</button><button class="danger" onclick="rejectSwap(${jsArg(item.record.record_id)})">Reject</button>` : ""}</div></td>
          </tr>`;
        }).join("") || `<tr><td colspan="7" class="muted">${text().empty}</td></tr>`}</tbody></table></div></section>`;
    }
    function renderDeclarations() {
      $("declarationsView").innerHTML = `<section class="panel"><h2>${text().requests}</h2>${declarationRows(state.declarations.slice().sort(byStatusThenDate).slice(0, 160))}</section>`;
    }
    function renderAnchors() {
      if (!state.anchors.length) return $("anchorsView").innerHTML = `<section class="panel"><p class="muted">${text().empty}</p></section>`;
      $("anchorsView").innerHTML = `<section class="panel"><h2>${text().hosts}</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Language</th><th>Country</th><th>TZ</th><th>Category</th><th>Level</th><th>Status</th></tr></thead><tbody>${state.anchors.map((record) => `<tr><td>${escapeHtml(field(record,F.host.id))}</td><td>${escapeHtml(field(record,F.host.name))}</td><td>${escapeHtml(field(record,F.host.language))}</td><td>${escapeHtml(field(record,F.host.country))}</td><td>${escapeHtml(field(record,F.host.timezone))}</td><td>${escapeHtml(field(record,F.host.category))}</td><td>${escapeHtml(field(record,F.host.level))}</td><td>${badge(field(record,F.host.status))}</td></tr>`).join("")}</tbody></table></div></section>`;
    }
    function render() {
      if (state.tab === "dashboard") renderDashboard();
      if (state.tab === "calendar") renderCalendar();
      if (state.tab === "schedules") renderSchedules();
      if (state.tab === "swaps") renderSwaps();
      if (state.tab === "declarations") renderDeclarations();
      if (state.tab === "anchors") renderAnchors();
    }

    $("startDate").value = today();
    setLang(currentLang);
    loadAll();
  </script>
</body>
</html>
