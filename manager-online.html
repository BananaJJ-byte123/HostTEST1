<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主管排班后台</title>
  <style>
    :root {
      --bg:#f5f7fb; --card:#fff; --ink:#111827; --muted:#667085; --line:#d8dee8;
      --blue:#2563eb; --green:#16845b; --amber:#b7791f; --red:#c24141; --dark:#101828;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,"Microsoft YaHei",sans-serif; color:var(--ink); background:var(--bg); }
    body.loading, body.loading * { cursor:progress !important; }
    header { background:var(--dark); color:#fff; padding:16px 22px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    h1,h2,h3,p { margin-top:0; } h1 { font-size:20px; margin-bottom:4px; } h2 { font-size:18px; } h3 { font-size:15px; margin-bottom:8px; }
    button,input,select { font:inherit; }
    button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:9px 12px; cursor:pointer; min-height:38px; }
    button.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
    button.danger { color:var(--red); border-color:#ffd0d0; background:#fff8f8; }
    button.good { color:var(--green); border-color:#bfe8d3; background:#f1fbf6; }
    input,select { border:1px solid var(--line); border-radius:6px; padding:9px 10px; width:100%; background:#fff; }
    label { display:grid; gap:6px; font-size:12px; color:#475467; font-weight:700; }
    main { padding:16px; max-width:1320px; margin:0 auto; }
    .muted { color:var(--muted); } .small { font-size:12px; }
    .header-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .lang { width:auto; min-width:132px; border-color:#344054; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px; }
    .tab { border-color:var(--line); color:#344054; }
    .tab.active { background:#e8efff; color:#1849b8; border-color:#b7c7ff; font-weight:800; }
    .panel,.stat,.day { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
    .two { display:grid; grid-template-columns:1.2fr .8fr; gap:12px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
    .stat b { display:block; font-size:26px; margin-top:4px; }
    .badge { display:inline-flex; align-items:center; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:800; }
    .green { background:#e8f7ef; color:#106b49; } .amber { background:#fff4df; color:#99610f; }
    .red { background:#ffe8e8; color:#a83333; } .blue { background:#e8efff; color:#1849b8; }
    .gray { background:#eef2f6; color:#475467; }
    tr.pending-row { background:#fffaf0; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:8px; background:#fff; }
    table { border-collapse:collapse; width:100%; min-width:900px; }
    th,td { border-bottom:1px solid var(--line); padding:9px; text-align:left; white-space:nowrap; font-size:13px; vertical-align:middle; }
    th { background:#f8fafc; color:#475467; }
    th.sortable { cursor:pointer; user-select:none; }
    th.sortable:hover { color:#1849b8; background:#eef4ff; }
    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .actions button { min-height:30px; padding:5px 8px; font-size:12px; }
    .calendar { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:8px; }
    .day { min-height:150px; margin:0; padding:10px; }
    .day h3 { display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:8px; }
    .shift { border:1px solid var(--line); border-radius:6px; padding:7px; margin-bottom:6px; background:#fafcff; font-size:12px; }
    .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:var(--dark); color:#fff; padding:10px 14px; border-radius:8px; opacity:0; pointer-events:none; transition:.2s; max-width:92vw; z-index:20; }
    .toast.show { opacity:1; }
    .loading-bar { position:fixed; left:0; right:0; top:0; height:3px; background:linear-gradient(90deg,var(--blue),var(--green),var(--amber)); transform:scaleX(0); transform-origin:left; opacity:0; transition:opacity .15s; z-index:50; animation:loadingMove 1.1s ease-in-out infinite; }
    body.loading .loading-bar { opacity:1; }
    @keyframes loadingMove { 0%{transform:scaleX(.08)} 50%{transform:scaleX(.72)} 100%{transform:scaleX(1)} }
    .hidden { display:none; }
    @media (max-width:960px){ .grid,.two{grid-template-columns:1fr 1fr;} .calendar{grid-template-columns:1fr 1fr;} header{align-items:flex-start;} }
    @media (max-width:640px){ .grid,.two,.calendar{grid-template-columns:1fr;} header{display:block;} .header-actions{justify-content:flex-start; margin-top:12px;} }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 data-i18n="title">主管排班后台</h1>
      <p class="small" style="color:#cbd5e1;margin:0;" data-i18n="subtitle">飞书多维表格 + Vercel API + 机器人通知</p>
    </div>
    <div class="header-actions">
      <select id="lang" class="lang" onchange="setLang(this.value)" aria-label="Language">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="id">Bahasa</option>
      </select>
      <button onclick="location.href='./admin-online.html'">管理员端</button>
      <button onclick="location.href='./anchor-online.html'" data-i18n="openAnchor">打开主播入口</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="toolbar">
        <label><span data-i18n="startDate">开始日期</span><input id="startDate" type="date"></label>
        <label><span data-i18n="days">生成天数</span><input id="days" type="number" min="1" max="31" value="7"></label>
        <label><span data-i18n="keyword">搜索</span><input id="keyword" oninput="render()" placeholder="主播/品牌/直播间"></label>
        <label><span data-i18n="status">状态</span><select id="statusFilter" onchange="render()"><option value="">All</option><option>草稿</option><option>已发布</option><option>已确认</option><option>缺人</option></select></label>
        <button class="primary" onclick="generateSchedule()" data-i18n="generateButton">生成排班</button>
        <button onclick="publishDrafts()" data-i18n="publishButton">发布草稿</button>
        <button onclick="loadAll()" data-i18n="refreshButton">刷新数据</button>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="dashboard" onclick="setTab('dashboard')" data-i18n="tabDashboard">今日大盘</button>
      <button class="tab" data-tab="calendar" onclick="setTab('calendar')" data-i18n="tabCalendar">日历</button>
      <button class="tab" data-tab="schedules" onclick="setTab('schedules')" data-i18n="tabSchedules">排班</button>
      <button class="tab" data-tab="swaps" onclick="setTab('swaps')" data-i18n="tabSwaps">换班池</button>
      <button class="tab" data-tab="declarations" onclick="setTab('declarations')" data-i18n="tabDeclarations">申报</button>
      <button class="tab" data-tab="anchors" onclick="setTab('anchors')" data-i18n="tabAnchors">主播</button>
    </nav>

    <section id="dashboardView"></section>
    <section id="calendarView" class="hidden"></section>
    <section id="schedulesView" class="hidden"></section>
    <section id="swapsView" class="hidden"></section>
    <section id="declarationsView" class="hidden"></section>
    <section id="anchorsView" class="hidden"></section>

    <section class="panel">
      <h2 data-i18n="healthTitle">系统状态</h2>
      <pre id="health" class="small muted"></pre>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <div class="loading-bar" aria-hidden="true"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { anchors: [], brands: [], templates: [], declarations: [], schedules: [], workload: [], tab: "dashboard", loading: 0, scheduleSort: { key:"日期", dir:"desc" } };
    const field = (r, name) => r.fields?.[name] ?? "";
    function isActiveSchedule(r) { const status = field(r, "\u72b6\u6001"); return status !== "\u5386\u53f2" && status !== "\u5df2\u53d6\u6d88"; }
    const today = () => new Date().toISOString().slice(0, 10);
    const i18n = {
      zh: {
        title:"主管排班后台", subtitle:"飞书多维表格 + Vercel API + 机器人通知", openAnchor:"打开主播入口",
        startDate:"开始日期", days:"生成天数", keyword:"搜索", status:"状态", generateButton:"生成排班", publishButton:"发布草稿", refreshButton:"刷新数据",
        tabDashboard:"今日大盘", tabCalendar:"日历", tabSchedules:"排班", tabSwaps:"换班池", tabDeclarations:"申报", tabAnchors:"主播",
        healthTitle:"系统状态", empty:"暂无数据", generating:"正在生成...", publishing:"正在发布...", refreshed:"已刷新", published:"已发布草稿", approved:"已同意", rejected:"已拒绝", confirmed:"已确认",
        stats:["主播","品牌/直播间","待处理申报","排班结果"], risk:"风险班次", swapHint:"主播互换班次后，系统会自动改写两条排班并通知主管。", dashboardHint:"主管看全盘、生成排班、发布班表、处理申报。",
        autoPanel:"自动排班", manualPanel:"手动指定排班", oneDay:"只排这一天", oneWeek:"排 1 周", twoWeeks:"排 2 周", monthSchedule:"排整月", workload:"月度工时", weeklyAudit:"生成每周留痕", manualCreate:"添加手动排班", anchor:"主播", brand:"品牌", room:"直播间", shift:"班次", startTime:"开始时间", endTime:"结束时间", note:"备注", created:"已添加手动排班",
        columns:{schedule:["日期","班次","时间","主播","品牌","直播间","状态","备注","操作"], declaration:["主播","类型","日期","时间","原因","状态","操作"], anchor:["主播ID","姓名","语言","国家","时区","类目","等级","状态"]},
        actions:{publish:"发布", confirm:"确认", approve:"同意", reject:"拒绝", forceComplete:"主管完成换班"}, generated:(count,missing)=>`已生成 ${count} 条，缺人 ${missing} 条`
      },
      en: {
        title:"Manager Console", subtitle:"Feishu Base + Vercel API + Bot Notification", openAnchor:"Open anchor portal",
        startDate:"Start date", days:"Days", keyword:"Search", status:"Status", generateButton:"Generate", publishButton:"Publish drafts", refreshButton:"Refresh",
        tabDashboard:"Dashboard", tabCalendar:"Calendar", tabSchedules:"Schedules", tabSwaps:"Swap pool", tabDeclarations:"Requests", tabAnchors:"Anchors",
        healthTitle:"System Status", empty:"No data", generating:"Generating...", publishing:"Publishing...", refreshed:"Refreshed", published:"Drafts published", approved:"Approved", rejected:"Rejected", confirmed:"Confirmed",
        stats:["Anchors","Brands / rooms","Pending requests","Schedules"], risk:"Risk shifts", swapHint:"When anchors complete a swap, the system rewrites both schedules and notifies the manager.", dashboardHint:"Review workload, generate schedules, publish shifts, and process requests.",
        autoPanel:"Auto scheduling", manualPanel:"Manual assignment", oneDay:"Only this day", oneWeek:"1 week", twoWeeks:"2 weeks", monthSchedule:"Full month", workload:"Monthly workload", weeklyAudit:"Generate weekly audit", manualCreate:"Add manual shift", anchor:"Anchor", brand:"Brand", room:"Room", shift:"Shift", startTime:"Start time", endTime:"End time", note:"Note", created:"Manual shift added",
        columns:{schedule:["Date","Shift","Time","Anchor","Brand","Room","Status","Notes","Actions"], declaration:["Anchor","Type","Date","Time","Reason","Status","Actions"], anchor:["ID","Name","Language","Country","TZ","Category","Level","Status"]},
        actions:{publish:"Publish", confirm:"Confirm", approve:"Approve", reject:"Reject", forceComplete:"Complete swap"}, generated:(count,missing)=>`Generated ${count} rows, missing ${missing}`
      },
      id: {
        title:"Konsol Supervisor", subtitle:"Feishu Base + Vercel API + Notifikasi Bot", openAnchor:"Buka portal anchor",
        startDate:"Tanggal mulai", days:"Hari", keyword:"Cari", status:"Status", generateButton:"Buat jadwal", publishButton:"Publikasikan draft", refreshButton:"Refresh",
        tabDashboard:"Dashboard", tabCalendar:"Kalender", tabSchedules:"Jadwal", tabSwaps:"Pool tukar", tabDeclarations:"Permintaan", tabAnchors:"Anchor",
        healthTitle:"Status Sistem", empty:"Belum ada data", generating:"Membuat jadwal...", publishing:"Mempublikasikan...", refreshed:"Data diperbarui", published:"Draft dipublikasikan", approved:"Disetujui", rejected:"Ditolak", confirmed:"Dikonfirmasi",
        stats:["Anchor","Brand / room","Permintaan pending","Jadwal"], risk:"Shift berisiko", swapHint:"Saat swap selesai, sistem memperbarui dua jadwal dan memberi tahu supervisor.", dashboardHint:"Pantau jadwal, buat jadwal, publikasikan shift, dan proses permintaan.",
        autoPanel:"Jadwal otomatis", manualPanel:"Assign manual", oneDay:"Hari ini saja", oneWeek:"1 minggu", twoWeeks:"2 minggu", monthSchedule:"Sebulan", workload:"Jam bulanan", weeklyAudit:"Buat audit mingguan", manualCreate:"Tambah shift manual", anchor:"Anchor", brand:"Brand", room:"Room", shift:"Shift", startTime:"Mulai", endTime:"Selesai", note:"Catatan", created:"Shift manual ditambahkan",
        columns:{schedule:["Tanggal","Shift","Waktu","Anchor","Brand","Room","Status","Catatan","Aksi"], declaration:["Anchor","Tipe","Tanggal","Waktu","Alasan","Status","Aksi"], anchor:["ID","Nama","Bahasa","Negara","TZ","Kategori","Level","Status"]},
        actions:{publish:"Publish", confirm:"Konfirmasi", approve:"Setujui", reject:"Tolak", forceComplete:"Selesaikan swap"}, generated:(count,missing)=>`Berhasil membuat ${count} baris, kekurangan ${missing}`
      }
    };
    let currentLang = localStorage.getItem("uiLang") || "zh";

    $("startDate").value = today();
    function t() { return i18n[currentLang]; }
    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("uiLang", lang);
      $("lang").value = lang;
      document.documentElement.lang = lang === "id" ? "id" : lang === "en" ? "en" : "zh-CN";
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t()[el.dataset.i18n]; });
      render();
    }
    function toast(text) {
      const el = $("toast"); el.textContent = text; el.classList.add("show");
      clearTimeout(window.__toast); window.__toast = setTimeout(() => el.classList.remove("show"), 1800);
    }
    function setLoading(active) {
      state.loading += active ? 1 : -1;
      if (state.loading < 0) state.loading = 0;
      document.body.classList.toggle("loading", state.loading > 0);
    }
    async function api(path, options) {
      setLoading(true);
      try {
        const res = await fetch(path, options);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "API error");
        return data;
      } finally {
        setLoading(false);
      }
    }
    async function updateRecord(type, recordId, fields, notifyText) {
      return api("/api/update", {
        method:"POST",
        headers:{ "content-type":"application/json" },
        body:JSON.stringify({ type, recordId, fields, notifyText })
      });
    }
    async function loadAll() {
      try {
        const data = await api("/api/bootstrap");
        state.anchors = data.records.anchors;
        state.brands = data.records.brands;
        state.templates = data.records.templates;
        state.declarations = data.records.declarations;
        state.schedules = data.records.schedules.filter(isActiveSchedule);
        $("health").textContent = JSON.stringify(data.env, null, 2);
        render();
        toast(t().refreshed);
      } catch (e) {
        toast(e.message);
        $("health").textContent = e.stack || e.message;
      }
    }
    async function refreshSchedulesOnly() {
      const data = await api("/api/data?type=schedules");
      state.schedules = data.records.filter(isActiveSchedule);
      render();
    }
    async function generateSchedule() {
      try {
        toast(t().generating);
        const data = await api("/api/generate", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ startDate:$("startDate").value, days:$("days").value })
        });
        toast(t().generated(data.count, data.missing));
        await refreshSchedulesOnly();
      } catch (e) { toast(e.message); }
    }
    function generateQuick(days) {
      $("days").value = days;
      generateSchedule();
    }
    async function generateMonthSchedule() {
      try {
        const month = ($("startDate").value || today()).slice(0, 7);
        toast(t().generating);
        const data = await api("/api/generate", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ month })
        });
        toast(t().generated(data.count, data.missing));
        await refreshSchedulesOnly();
        await loadWorkload();
      } catch (e) { toast(e.message); }
    }
    async function cleanupSchedules() {
      try {
        toast("\u6b63\u5728\u6e05\u7406\u91cd\u590d\u6392\u73ed...");
        const data = await api("/api/generate", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ action:"cleanup-duplicates" })
        });
        toast(`\u5df2\u6807\u8bb0 ${data.markedHistory || 0} \u6761\u65e7\u6392\u73ed\u4e3a\u5386\u53f2`);
        await refreshSchedulesOnly();
        await loadWorkload();
      } catch (e) { toast(e.message); }
    }
    async function loadWorkload() {
      try {
        const month = ($("startDate").value || today()).slice(0, 7);
        const data = await api(`/api/workload?month=${month}`);
        state.workload = data.records;
        if (state.tab === "dashboard" || state.tab === "schedules") render();
      } catch (e) { toast(e.message); }
    }
    async function generateWeeklyAudit() {
      try {
        const data = await api(`/api/audit-weekly?from=${$("startDate").value || today()}`);
        toast(`已生成周留痕：${data.count} 条`);
      } catch (e) { toast(e.message); }
    }
    async function createManualSchedule() {
      try {
        const template = state.templates.find((item) => field(item, "班次名称") === $("manualShift").value) || {};
        const brand = state.brands.find((item) => field(item, "品牌名") === $("manualBrand").value) || {};
        const body = {
          date:$("manualDate").value,
          shift:$("manualShift").value,
          startTime:$("manualStart").value || field(template, "开始时间"),
          endTime:$("manualEnd").value || field(template, "结束时间"),
          anchorName:$("manualAnchor").value,
          brand:$("manualBrand").value,
          room:$("manualRoom").value || field(brand, "直播间名称"),
          status:$("manualStatus").value,
          note:$("manualNote").value
        };
        await api("/api/manual-schedule", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify(body)
        });
        toast(t().created);
        await refreshSchedulesOnly();
      } catch (e) { toast(e.message); }
    }
    async function publishDrafts() {
      const drafts = state.schedules.filter((r) => field(r, "状态") === "草稿");
      if (!drafts.length) return toast(t().empty);
      try {
        toast(t().publishing);
        await api("/api/update", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({
            type:"schedules",
            records:drafts.map((r) => ({ record_id:r.record_id, fields:{ "状态":"已发布" } })),
            notifyText:`已发布 ${drafts.length} 条排班。`
          })
        });
        drafts.forEach((record) => { record.fields["状态"] = "已发布"; });
        toast(t().published);
        render();
      } catch (e) { toast(e.message); }
    }
    async function setScheduleStatus(recordId, status) {
      try {
        await updateRecord("schedules", recordId, { "状态":status }, `排班状态更新为：${status}`);
        const record = state.schedules.find((item) => item.record_id === recordId);
        if (record) record.fields["状态"] = status;
        toast(status === "已确认" ? t().confirmed : t().published);
        render();
      } catch (e) { toast(e.message); }
    }
    async function setDeclarationStatus(recordId, status) {
      try {
        await updateRecord("declarations", recordId, { "状态":status }, `主播申报已${status}`);
        const record = state.declarations.find((item) => item.record_id === recordId);
        if (record) record.fields["状态"] = status;
        toast(status === "已同意" ? t().approved : t().rejected);
        render();
      } catch (e) { toast(e.message); }
    }
    function setTab(tab) {
      state.tab = tab;
      document.querySelectorAll(".tab").forEach((el) => el.classList.toggle("active", el.dataset.tab === tab));
      ["dashboard","calendar","schedules","swaps","declarations","anchors"].forEach((name) => {
        $(`${name}View`).classList.toggle("hidden", name !== tab);
      });
      render();
    }
    function parseSwapMeta(text) {
      if (!text || !text.startsWith("SWAP_REQUEST|")) return null;
      return Object.fromEntries(text.split("|").slice(1).map((part) => {
        const i = part.indexOf("=");
        return i > -1 ? [part.slice(0, i), decodeURIComponent(part.slice(i + 1))] : [part, ""];
      }));
    }
    function scheduleLabel(r) {
      if (!r) return "-";
      return `${field(r,"日期")} ${field(r,"班次")} ${field(r,"开始时间")}-${field(r,"结束时间")} · ${field(r,"主播姓名")} · ${field(r,"品牌")}`;
    }
    function jsArg(value) {
      return JSON.stringify(String(value || ""));
    }
    async function completeSwap(recordId, anchorName) {
      try {
        const declaration = state.declarations.find((item) => item.record_id === recordId);
        const meta = declaration ? parseSwapMeta(field(declaration, "原因")) : null;
        const from = meta ? state.schedules.find((item) => item.record_id === meta.from) : null;
        const to = meta ? state.schedules.find((item) => item.record_id === meta.to) : null;
        const fromAnchor = declaration ? field(declaration, "主播姓名") : "";
        const toAnchor = anchorName || (to ? field(to, "主播姓名") : "");
        await api("/api/swap", {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body:JSON.stringify({ action:"accept", declarationRecordId:recordId, anchorName })
        });
        if (declaration) declaration.fields["状态"] = "已同意";
        if (from && to) {
          from.fields["主播姓名"] = toAnchor;
          from.fields["状态"] = "已发布";
          from.fields["备注"] = `已与 ${fromAnchor} 完成换班`;
          to.fields["主播姓名"] = fromAnchor;
          to.fields["状态"] = "已发布";
          to.fields["备注"] = `已与 ${toAnchor} 完成换班`;
        }
        toast(t().approved);
        render();
      } catch (e) { toast(e.message); }
    }
    function filteredSchedules() {
      const term = $("keyword").value.trim().toLowerCase();
      const status = $("statusFilter").value;
      return state.schedules.filter((r) => {
        const haystack = ["主播姓名","品牌","直播间","班次","日期"].map((key) => field(r, key)).join(" ").toLowerCase();
        return (!term || haystack.includes(term)) && (!status || field(r, "状态") === status);
      });
    }
    function setScheduleSort(key) {
      if (state.scheduleSort.key === key) {
        state.scheduleSort.dir = state.scheduleSort.dir === "asc" ? "desc" : "asc";
      } else {
        state.scheduleSort = { key, dir:"asc" };
      }
      renderSchedules();
    }
    function sortValue(record, key) {
      if (key === "时间") return `${field(record, "开始时间")}-${field(record, "结束时间")}`;
      return field(record, key);
    }
    function sortSchedules(records) {
      const { key, dir } = state.scheduleSort;
      const factor = dir === "asc" ? 1 : -1;
      return records.slice().sort((a, b) => {
        const av = sortValue(a, key);
        const bv = sortValue(b, key);
        const result = String(av).localeCompare(String(bv), "zh-Hans-CN", { numeric:true });
        if (result) return result * factor;
        return byStatusThenDate(a, b);
      });
    }
    function syncManualTemplate() {
      const template = state.templates.find((item) => field(item, "班次名称") === $("manualShift")?.value);
      if (!template) return;
      $("manualStart").value = field(template, "开始时间") || $("manualStart").value;
      $("manualEnd").value = field(template, "结束时间") || $("manualEnd").value;
    }
    function syncManualBrand() {
      const brand = state.brands.find((item) => field(item, "品牌名") === $("manualBrand")?.value);
      if (!brand) return;
      $("manualRoom").value = field(brand, "直播间名称") || $("manualRoom").value;
    }
    function statusRank(status) {
      return { "待处理":0, "缺人":1, "草稿":2, "已发布":3, "已确认":4, "已同意":5, "已拒绝":6, "停用":7, "正常":8 }[status] ?? 9;
    }
    function byStatusThenDate(a, b) {
      const statusDiff = statusRank(field(a, "状态")) - statusRank(field(b, "状态"));
      if (statusDiff) return statusDiff;
      return `${field(b,"日期")} ${field(b,"开始时间")}`.localeCompare(`${field(a,"日期")} ${field(a,"开始时间")}`);
    }
    function badge(status) {
      const cls = {
        "待处理":"amber",
        "草稿":"gray",
        "已发布":"blue",
        "已确认":"green",
        "已同意":"green",
        "已拒绝":"red",
        "缺人":"red",
        "停用":"red",
        "正常":"green"
      }[status] || "gray";
      return `<span class="badge ${cls}">${status || "-"}</span>`;
    }
    function scheduleRows(records) {
      if (!records.length) return `<p class="muted">${t().empty}</p>`;
      const sortKeys = ["日期","班次","时间","主播姓名","品牌","直播间","状态"];
      const labels = t().columns.schedule;
      const heads = labels.map((label, index) => {
        const key = sortKeys[index];
        if (!key) return `<th>${label}</th>`;
        const mark = state.scheduleSort.key === key ? (state.scheduleSort.dir === "asc" ? " ↑" : " ↓") : "";
        return `<th class="sortable" onclick="setScheduleSort('${key}')">${label}${mark}</th>`;
      }).join("");
      return `<div class="table-wrap"><table><thead><tr>${heads}</tr></thead><tbody>${records.map((r) => {
        const status = field(r, "状态");
        return `<tr class="${["待处理","缺人","草稿"].includes(status) ? "pending-row" : ""}">
          <td>${field(r,"日期")}</td><td>${field(r,"班次")}</td><td>${field(r,"开始时间")}-${field(r,"结束时间")}</td>
          <td>${field(r,"主播姓名") || "-"}</td><td>${field(r,"品牌")}</td><td>${field(r,"直播间")}</td><td>${badge(status)}</td><td>${field(r,"备注")}</td>
          <td><div class="actions">
            ${status === "草稿" ? `<button onclick="setScheduleStatus('${r.record_id}','已发布')">${t().actions.publish}</button>` : ""}
            ${status !== "已确认" ? `<button class="good" onclick="setScheduleStatus('${r.record_id}','已确认')">${t().actions.confirm}</button>` : ""}
          </div></td>
        </tr>`;
      }).join("")}</tbody></table></div>`;
    }
    function declarationRows(records) {
      if (!records.length) return `<p class="muted">${t().empty}</p>`;
      return `<div class="table-wrap"><table><thead><tr>${t().columns.declaration.map((c) => `<th>${c}</th>`).join("")}</tr></thead><tbody>${records.map((r) => {
        const status = field(r, "状态");
        return `<tr class="${status === "待处理" ? "pending-row" : ""}">
          <td>${field(r,"主播姓名")}</td><td>${field(r,"申报类型")}</td><td>${field(r,"日期")}</td><td>${field(r,"开始时间")}-${field(r,"结束时间")}</td>
          <td>${field(r,"原因")}</td><td>${badge(status)}</td>
          <td><div class="actions">
            ${status === "待处理" ? `<button class="good" onclick="setDeclarationStatus('${r.record_id}','已同意')">${t().actions.approve}</button><button class="danger" onclick="setDeclarationStatus('${r.record_id}','已拒绝')">${t().actions.reject}</button>` : ""}
          </div></td>
        </tr>`;
      }).join("")}</tbody></table></div>`;
    }
    function renderDashboard() {
      const pending = state.declarations.filter((r) => field(r, "状态") === "待处理");
      const risk = state.schedules.filter((r) => !field(r, "主播姓名") || field(r, "状态") === "缺人");
      const todayRows = state.schedules.filter((r) => field(r, "日期") === today()).slice(0, 8);
      $("dashboardView").innerHTML = `
        <section class="grid">
          <div class="stat"><span class="muted">${t().stats[0]}</span><b>${state.anchors.length}</b></div>
          <div class="stat"><span class="muted">${t().stats[1]}</span><b>${state.brands.length}</b></div>
          <div class="stat"><span class="muted">${t().stats[2]}</span><b>${pending.length}</b></div>
          <div class="stat"><span class="muted">${t().stats[3]}</span><b>${state.schedules.length}</b></div>
        </section>
        <section class="two">
          <div class="panel"><h2>${t().tabDashboard}</h2><p class="muted">${t().dashboardHint}</p>${scheduleRows(todayRows)}</div>
          <div class="panel"><h2>${t().risk}</h2>${scheduleRows(risk.slice(0, 8))}</div>
        </section>`;
    }
    function renderCalendar() {
      const start = new Date(`${$("startDate").value}T00:00:00`);
      const days = Math.min(14, Math.max(1, Number($("days").value || 7)));
      const rows = filteredSchedules();
      const cells = [];
      for (let i = 0; i < days; i += 1) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const date = d.toISOString().slice(0, 10);
        const shifts = rows.filter((r) => field(r, "日期") === date);
        cells.push(`<div class="day"><h3><span>${date}</span><span class="badge blue">${shifts.length}</span></h3>${shifts.slice(0, 6).map((r) => `<div class="shift"><b>${field(r,"班次")}</b> ${field(r,"开始时间")}-${field(r,"结束时间")}<br>${field(r,"主播姓名") || "-"} · ${field(r,"品牌")}<br>${badge(field(r,"状态"))}</div>`).join("") || `<p class="muted small">${t().empty}</p>`}</div>`);
      }
      $("calendarView").innerHTML = `<section class="calendar">${cells.join("")}</section>`;
    }
    function renderSchedules() {
      const anchorOptions = state.anchors
        .filter((item) => field(item, "状态") !== "停用")
        .map((item) => `<option value="${field(item, "姓名")}">${field(item, "姓名")} · ${field(item, "语言")} · ${field(item, "擅长类目")}</option>`)
        .join("");
      const brandOptions = state.brands
        .filter((item) => field(item, "状态") !== "停用")
        .map((item) => `<option value="${field(item, "品牌名")}">${field(item, "品牌名")} · ${field(item, "直播间名称")}</option>`)
        .join("");
      const templateOptions = state.templates
        .filter((item) => field(item, "状态") !== "停用")
        .map((item) => `<option value="${field(item, "班次名称")}">${field(item, "班次名称")} · ${field(item, "开始时间")}-${field(item, "结束时间")}</option>`)
        .join("");
      const firstTemplate = state.templates.find((item) => field(item, "状态") !== "停用") || {};
      const firstBrand = state.brands.find((item) => field(item, "状态") !== "停用") || {};
      $("schedulesView").innerHTML = `<section class="panel"><h2>${t().autoPanel}</h2><div class="toolbar">
        <button class="primary" onclick="generateQuick(1)">${t().oneDay}</button>
        <button onclick="generateQuick(7)">${t().oneWeek}</button>
        <button onclick="generateQuick(14)">${t().twoWeeks}</button>
        <button onclick="generateMonthSchedule()">${t().monthSchedule}</button>
        <button onclick="loadWorkload()">${t().workload}</button>
        <button onclick="generateWeeklyAudit()">${t().weeklyAudit}</button>
        <button onclick="cleanupSchedules()">\u6e05\u7406\u91cd\u590d\u6392\u73ed</button>
      </div></section>
      <section class="panel"><h2>${t().manualPanel}</h2><div class="toolbar">
        <label>${t().startDate}<input id="manualDate" type="date" value="${$("startDate").value || today()}"></label>
        <label>${t().shift}<select id="manualShift" onchange="syncManualTemplate()">${templateOptions}</select></label>
        <label>${t().startTime}<input id="manualStart" type="time" value="${field(firstTemplate, "开始时间") || "09:00"}"></label>
        <label>${t().endTime}<input id="manualEnd" type="time" value="${field(firstTemplate, "结束时间") || "12:00"}"></label>
        <label>${t().anchor}<select id="manualAnchor">${anchorOptions}</select></label>
        <label>${t().brand}<select id="manualBrand" onchange="syncManualBrand()">${brandOptions}</select></label>
        <label>${t().room}<input id="manualRoom" value="${field(firstBrand, "直播间名称")}"></label>
        <label>${t().status}<select id="manualStatus"><option>草稿</option><option>已发布</option><option>已确认</option></select></label>
        <label>${t().note}<input id="manualNote" value="主管手动指定"></label>
        <button class="primary" onclick="createManualSchedule()">${t().manualCreate}</button>
      </div></section>
      <section class="panel"><h2>${t().workload}</h2>${workloadRows()}</section>
      <section class="panel"><h2>${t().tabSchedules}</h2>${scheduleRows(sortSchedules(filteredSchedules()).slice(0, 160))}</section>`;
    }
    function workloadRows() {
      if (!state.workload.length) return `<p class="muted">${t().empty}</p>`;
      return `<div class="table-wrap"><table><thead><tr><th>主播</th><th>语言</th><th>等级</th><th>目标工时</th><th>已排工时</th><th>剩余/超出</th><th>场次</th></tr></thead><tbody>${state.workload.map((r) => `<tr class="${r.balanceHours < 0 ? "pending-row" : ""}"><td>${r.name}</td><td>${r.language}</td><td>${r.level}</td><td>${r.targetHours}</td><td>${r.scheduledHours}</td><td>${r.balanceHours}</td><td>${r.shifts}</td></tr>`).join("")}</tbody></table></div>`;
    }
    function renderDeclarations() {
      $("declarationsView").innerHTML = `<section class="panel"><h2>${t().tabDeclarations}</h2>${declarationRows(state.declarations.slice().sort(byStatusThenDate).slice(0, 160))}</section>`;
    }
    function renderSwaps() {
      const swaps = state.declarations
        .filter((r) => field(r, "申报类型") === "换班")
        .map((r) => ({ record:r, meta:parseSwapMeta(field(r, "原因")) }))
        .filter((item) => item.meta)
        .sort((a, b) => byStatusThenDate(a.record, b.record));
      $("swapsView").innerHTML = `<section class="panel"><h2>${t().tabSwaps}</h2><p class="muted">${t().swapHint}</p>
        <div class="table-wrap"><table><thead><tr><th>A</th><th>B</th><th>A 原班</th><th>B 原班</th><th>状态</th><th>操作</th></tr></thead><tbody>
        ${swaps.map((item) => {
          const from = state.schedules.find((r) => r.record_id === item.meta.from);
          const to = state.schedules.find((r) => r.record_id === item.meta.to);
          const status = field(item.record, "状态");
          return `<tr class="${status === "待处理" ? "pending-row" : ""}">
            <td>${field(item.record, "主播姓名")}</td><td>${item.meta.target || field(to, "主播姓名")}</td>
            <td>${scheduleLabel(from)}</td><td>${scheduleLabel(to)}</td><td>${badge(status)}</td>
            <td><div class="actions">${status === "待处理" ? `<button class="good" onclick="completeSwap(${jsArg(item.record.record_id)},${jsArg(item.meta.target || field(to, "主播姓名"))})">${t().actions.forceComplete}</button><button class="danger" onclick="setDeclarationStatus(${jsArg(item.record.record_id)},'已拒绝')">${t().actions.reject}</button>` : ""}</div></td>
          </tr>`;
        }).join("") || `<tr><td colspan="6" class="muted">${t().empty}</td></tr>`}
        </tbody></table></div></section>`;
    }
    function renderAnchors() {
      const rows = state.anchors;
      if (!rows.length) return $("anchorsView").innerHTML = `<section class="panel"><p class="muted">${t().empty}</p></section>`;
      $("anchorsView").innerHTML = `<section class="panel"><h2>${t().tabAnchors}</h2><div class="table-wrap"><table><thead><tr>${t().columns.anchor.map((c) => `<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.map((r) => `<tr><td>${field(r,"主播ID")}</td><td>${field(r,"姓名")}</td><td>${field(r,"语言")}</td><td>${field(r,"国家")}</td><td>${field(r,"时区")}</td><td>${field(r,"擅长类目")}</td><td>${field(r,"等级")}</td><td>${badge(field(r,"状态"))}</td></tr>`).join("")}</tbody></table></div></section>`;
    }
    function render() {
      if (state.tab === "dashboard") renderDashboard();
      if (state.tab === "calendar") renderCalendar();
      if (state.tab === "schedules") renderSchedules();
      if (state.tab === "swaps") renderSwaps();
      if (state.tab === "declarations") renderDeclarations();
      if (state.tab === "anchors") renderAnchors();
    }
    setLang(currentLang);
    loadAll();
  </script>
</body>
</html>
